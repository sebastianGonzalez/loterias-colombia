name: Actualización diaria de loterías

# Corre todos los días. GitHub ejecuta el cron en UTC.
# 11:00 UTC = 06:00 hora de Colombia (COT, UTC-5).
# Se ejecuta también manualmente desde la pestaña Actions ("Run workflow").
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar histórico de todas las loterías (escribe en Postgres)
        env:
          # Se define como secret del repositorio: Settings -> Secrets -> Actions.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python update_daily.py
