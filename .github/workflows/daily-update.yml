name: Actualización diaria de loterías

# Corre todos los días. GitHub ejecuta el cron en UTC.
# 11:00 UTC = 06:00 hora de Colombia (COT, UTC-5).
# Se ejecuta también manualmente desde la pestaña Actions ("Run workflow").
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

# Permite que el workflow haga commit de la base de datos actualizada.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar histórico de todas las loterías
        run: python update_daily.py

      - name: Commit de la base de datos si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/lottery.db
          if git diff --staged --quiet; then
            echo "Sin cambios en la base de datos."
          else
            git commit -m "chore: actualización diaria de resultados [skip ci]"
            git push
          fi
