# Despliegue en Render (https://render.com) — plan gratuito.
# Render redespliega automáticamente con cada push a la rama principal.
#
# PERSISTENCIA: la app lee/escribe en Postgres vía la variable DATABASE_URL.
# Esa variable se configura en el dashboard de Render (Environment) con la cadena
# de conexión de la base Postgres (Neon). NO se pone aquí por seguridad (es un secreto).
# El mismo DATABASE_URL se configura como secret en GitHub Actions para que el
# actualizador diario escriba en la MISMA base persistente.
services:
  - type: web
    name: loterias-colombia
    runtime: python
    plan: free
    envVars:
      # Fija Python 3.12 (con 3.13 fallan los wheels de pydantic-core).
      - key: PYTHON_VERSION
        value: "3.12.10"
      # DATABASE_URL se define en el dashboard (sync:false = no se versiona).
      - key: DATABASE_URL
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
